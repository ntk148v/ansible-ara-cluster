version: "3.8"

volumes:
  pg_data:
    driver: local

services:
  ara:
    image: recordsansible/ara-api:latest
    container_name: ara
    environment:
      - ARA_ALLOWED_HOSTS=["*"]
      - ARA_DATABASE_DRIVER=postgresql
      - ARA_DATABASE_USER=ara
      - ARA_DATABASE_PASSWORD=${ARA_DATABASE_PASSWORD}
      - ARA_DATABASE_HOST=${VIP_IP}
      - ARA_DATABASE_PORT=5432
      - ARA_DATABASE_NAME=ara
      - ARA_EXTERNAL_AUTH=True
      - ARA_READ_LOGIN_REQUIRED=False
      - ARA_WRITE_LOGIN_REQUIRED=False
    depends_on:
      - pgpool
    restart: always
  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - ara
    volumes:
      - ./nginx/ara.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/htpasswd:/etc/nginx/.htpasswd:ro
    ports:
      - 8000:8000 # Expose Nginx on port 8000
    restart: always

  postgresql:
    image: bitnami/postgresql-repmgr:17
    container_name: postgresql
    ports:
      - 5433:5432
    volumes:
      - pg_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_USERNAME=ara
      - POSTGRESQL_PASSWORD=${ARA_DATABASE_PASSWORD}
      - POSTGRESQL_DATABASE=ara
      - REPMGR_PASSWORD=${REPMGR_PASSWORD}
      - REPMGR_PRIMARY_PORT=5433
      - REPMGR_PRIMARY_HOST=${REPMGR_PRIMARY_HOST}
      - REPMGR_PARTNER_NODES=${REPMGR_PARTNER_NODES}
      - REPMGR_NODE_NAME=${REPMGR_NODE_NAME}
      - REPMGR_NODE_NETWORK_NAME=${REPMGR_NODE_NETWORK_NAME}
      - REPMGR_PORT_NUMBER=5433
    restart: always

  pgpool:
    image: docker.io/bitnami/pgpool:4
    container_name: pgpool
    ports:
      - 5432:5432
    environment:
      - PGPOOL_BACKEND_NODES=${POSTGRESQL_BACKEND_NODES}
      - PGPOOL_SR_CHECK_USER=repmgr
      - PGPOOL_SR_CHECK_PASSWORD=${REPMGR_PASSWORD}
      - PGPOOL_ENABLE_LDAP=no
      - PGPOOL_POSTGRES_USERNAME=postgres
      - PGPOOL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - PGPOOL_ADMIN_USERNAME=admin
      - PGPOOL_ADMIN_PASSWORD=${PGPOOL_ADMIN_PASSWORD}
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
      - PGPOOL_POSTGRES_CUSTOM_USERS=ara
      - PGPOOL_POSTGRES_CUSTOM_PASSWORDS=${ARA_DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "/opt/bitnami/scripts/pgpool/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
